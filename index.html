<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Absen Online SMP Negeri 3 Sindang</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

.card{
  background:#1b263b;
  width:360px;
  padding:25px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.4);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:10px;
}

h2{
  margin:10px 0 20px;
  font-weight:600;
}

select,button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  font-size:15px;
}

select{
  border:none;
}

button{
  border:none;
  background:#00b4d8;
  color:#fff;
  font-weight:600;
}

button:disabled, select:disabled{
  background:#555;
  color:#ccc;
}

#status{
  margin-top:15px;
  font-weight:bold;
}

.status-ok{ color:#ffffff; }
.status-error{ color:#ff4d4d; }
.status-lock{ color:#ffb703; }
</style>
</head>

<body>

<div class="card">

  <!-- LOGO SEKOLAH -->
  <img class="logo"
       src="https://live.staticflickr.com/65535/55117010556_5b4b6a4b2c_w.jpg"
       alt="Logo SMP Negeri 3 Sindang"
       onerror="this.style.display='none'">

  <h2>Absen Online</h2>

  <select id="nama" disabled>
    <option value="">-- Pilih Nama --</option>
    <option>AINUN ASISAH</option>
    <option>ALIYAH NURHIDAYANTI</option>
    <option>CAHAYA AULIA</option>
    <option>CARWENDI</option>
    <option>DAYANTI</option>
    <option>DESIKA AMELIYA KOLISO</option>
    <option>FAISAL MUHAMAD RIZKI</option>
    <option>FIKA CALSIA</option>
    <option>HAFID RIZQULLAH MAULIDIN</option>
    <option>IKHSAN SUTONO</option>
    <option>KAFADHIL TRI ARDHANI</option>
    <option>KAILA NUR SAFITRI</option>
    <option>KHANSA PUTRI CANTIKA</option>
    <option>MESSI CAHYANINGRUM</option>
    <option>MEY NURFALITA</option>
    <option>MOHAMMAD LUQMANUL HAKIM</option>
    <option>MUHAMAD YUSUF</option>
    <option>MUHAMMAD MAFTU RIDHO</option>
    <option>NAZRIL IRWANTO</option>
    <option>RANGGA NAUFFAL IMZAALI</option>
    <option>REGINA ZAHIRA</option>
    <option>RIZQON ABDUL TAMRIN</option>
    <option>SEKAR WANGI</option>
    <option>SLAMET PRASETYO</option>
    <option>TAMAM IHWAN</option>
    <option>TIAS NELIN</option>
    <option>TIRANI</option>
    <option>WARNATA</option>
    <option>WILLIAM ABIE HERMAN</option>
    <option>WINARTI JAYANTI</option>
  </select>

  <button id="btnHadir" onclick="kirimAbsen()" disabled>Hadir</button>

  <div id="status" class="status-error">Mengambil lokasi...</div>
</div>

<script>
const SCHOOL_LAT = -6.328985;
const SCHOOL_LNG = 108.321355;
const RADIUS = 100;
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyeGf7CCwfJRZEJpt3ndHFO8mX01LjZHw-kTeGoP0BYkL3iB-1fE4ovCOagGPv_zYVe/exec";

function jarak(lat1,lon1,lat2,lon2){
  const R=6371e3;
  const a=
    Math.sin((lat2-lat1)*Math.PI/360)**2+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin((lon2-lon1)*Math.PI/360)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function jamValid(){
  const n=new Date();
  const j=n.getHours()+n.getMinutes()/60;
  return j>=6 && j<=7.25;
}

navigator.geolocation.getCurrentPosition(p=>{
  const d=jarak(p.coords.latitude,p.coords.longitude,SCHOOL_LAT,SCHOOL_LNG);

  if(d>RADIUS){
    statusMsg("anda di luar jangkauan","error");
    return;
  }
  if(!jamValid()){
    statusMsg("attendance locked","lock");
    return;
  }
  statusMsg("Absen Online","ok");
  aktifkan(true);
});

function aktifkan(v){
  document.getElementById("nama").disabled=!v;
  document.getElementById("btnHadir").disabled=!v;
}

function statusMsg(t,mode){
  const s=document.getElementById("status");
  s.textContent=t;
  s.className={
    ok:"status-ok",
    error:"status-error",
    lock:"status-lock"
  }[mode];
}

function kirimAbsen(){
  const nama=document.getElementById("nama").value;
  if(!nama){alert("Silakan pilih nama");return;}

  fetch(WEB_APP_URL,{
    method:"POST",
    body:JSON.stringify({nama:nama})
  }).then(()=>{
    alert("Absen berhasil");
    aktifkan(false);
  });
}
</script>

</body>
</html>
