<script>
const sekolahLat = -6.328985;
const sekolahLng = 108.321355;
const maxDistance = 0.1;

// URL DEPLOY TERBARU (FIX)
const scriptURL =
"https://script.google.com/macros/s/AKfycby2gFp6y_vgFWLYreiXM8cp2bad7zpwViFERPocinyjysxrcQUuhleIyb4uI3icErA/exec";

function absen() {
  const nama = document.getElementById("nama").value.trim();
  if (!nama) {
    alert("Nama harus diisi");
    return;
  }

  fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "nama=" + encodeURIComponent(nama) + "&status=Hadir"
  })
  .then(r => r.text())
  .then(() => {
    document.getElementById("status").innerText = "Absen berhasil dikirim";
    document.getElementById("status").className = "white";
    document.getElementById("btnHadir").disabled = true;
  })
  .catch(() => {
    document.getElementById("status").innerText = "Gagal mengirim absen";
    document.getElementById("status").className = "red";
  });
}
</script>
