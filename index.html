<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absen Kehadiran SMP Negeri 3 Sindang</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1E90FF, #4682B4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .absen-box {
      background-color: #1E90FF;
      border: 4px solid white;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      width: 380px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      color: white;
    }
    h2 { margin: 0; font-size: 26px; }
    h3 { margin: 5px 0 20px; font-weight: normal; }
    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid white;
      margin: 15px auto;
      display: block;
      object-fit: cover;
    }
    input {
      width: 90%;
      padding: 12px;
      margin: 15px 0;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      text-align: center;
    }
    button {
      width: 95%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
    .enabled {
      background: white;
      color: #1E90FF;
      font-weight: bold;
    }
    .disabled {
      background: #ccc;
      color: #666;
      cursor: not-allowed;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
    }
    .red { color: red; }
    .white { color: white; }
  </style>
</head>

<body>

<div class="absen-box">
  <h2>ABSEN KEHADIRAN</h2>
  <h3>SMP Negeri 3 Sindang</h3>

  <img src="https://i.ibb.co/WNSc2wtP/LOGO-SMPN-3-SINDANG.png" class="logo">

  <input type="text" id="nama" placeholder="Nama lengkap">
  <button id="btnHadir" class="disabled" disabled onclick="absen()">Hadir</button>

  <p id="status" class="red">Mengecek lokasi...</p>
</div>

<script>
/* ===== KONFIGURASI SEKOLAH ===== */
const sekolahLat = -6.328985;
const sekolahLng = 108.321355;
const maxDistance = 0.1; // 100 meter

/* ===== URL APPS SCRIPT (FIX) ===== */
const scriptURL = "https://script.google.com/macros/s/AKfycbxLwklqwI2k8OzE71yrcwIo02yHlTiYFFgLzr4msw0uc0KadxsD7IXNJ4pvS50DHN4o/exec";

/* ===== HITUNG JARAK ===== */
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) ** 2;
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

/* ===== CEK LOKASI ===== */
navigator.geolocation.getCurrentPosition(pos => {
  const jarak = getDistance(
    pos.coords.latitude,
    pos.coords.longitude,
    sekolahLat,
    sekolahLng
  );

  const status = document.getElementById("status");
  const btn = document.getElementById("btnHadir");

  if (jarak <= maxDistance) {
    status.innerText = "Absen Online Aktif";
    status.className = "white";
    btn.disabled = false;
    btn.className = "enabled";
  } else {
    status.innerText = "Anda berada di luar jangkauan";
    status.className = "red";
  }
}, err => {
  document.getElementById("status").innerText =
    "Gagal mendapatkan lokasi: " + err.message;
});

/* ===== KIRIM ABSEN ===== */
function absen() {
  const nama = document.getElementById("nama").value.trim();
  if (!nama) {
    alert("Nama harus diisi");
    return;
  }

  fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "nama=" + encodeURIComponent(nama) + "&status=Hadir"
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("status").innerText = "Absen berhasil dikirim";
    document.getElementById("status").className = "white";
    document.getElementById("btnHadir").disabled = true;
  })
  .catch(() => {
    document.getElementById("status").innerText = "Gagal mengirim absen";
    document.getElementById("status").className = "red";
  });
}
</script>

</body>
</html>
