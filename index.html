 <script>
const sekolahLat = -6.328985;
const sekolahLng = 108.321355;
const maxDistance = 0.1;

// URL DEPLOY TERBARU ANDA
const scriptURL =
"https://script.google.com/macros/s/AKfycby2gFp6y_vgFWLYreiXM8cp2bad7zpwViFERPocinyjysxrcQUuhleIyb4uI3icErA/exec";

// ===== CEK JAM (CLIENT) =====
function dalamJamAbsen() {
  const now = new Date();
  const jam = now.getHours();
  const menit = now.getMinutes();
  const totalMenit = jam * 60 + menit;

  const mulai = 6 * 60 + 30;   // 06:30
  const selesai = 7 * 60 + 15; // 07:15

  return totalMenit >= mulai && totalMenit <= selesai;
}

// ===== HITUNG JARAK =====
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) ** 2;
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

// ===== CEK LOKASI + JAM =====
navigator.geolocation.getCurrentPosition(pos => {
  const status = document.getElementById("status");
  const btn = document.getElementById("btnHadir");

  if (!dalamJamAbsen()) {
    status.innerText = "Absen hanya pukul 06.30 – 07.15 WIB";
    status.className = "red";
    return;
  }

  const jarak = getDistance(
    pos.coords.latitude,
    pos.coords.longitude,
    sekolahLat,
    sekolahLng
  );

  if (jarak <= maxDistance) {
    status.innerText = "Absen Online Aktif";
    status.className = "white";
    btn.disabled = false;
    btn.className = "enabled";
  } else {
    status.innerText = "Anda berada di luar jangkauan";
    status.className = "red";
  }
}, err => {
  document.getElementById("status").innerText =
    "Gagal mendapatkan lokasi: " + err.message;
});

// ===== KIRIM ABSEN =====
function absen() {
  const nama = document.getElementById("nama").value.trim();
  if (!nama) {
    alert("Nama harus diisi");
    return;
  }

  fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "nama=" + encodeURIComponent(nama) + "&status=Hadir"
  })
  .then(r => r.text())
  .then(res => {
    if (res.includes("DITOLAK")) {
      document.getElementById("status").innerText =
        "Di luar jam absen (06.30 – 07.15)";
      document.getElementById("status").className = "red";
    } else {
      document.getElementById("status").innerText =
        "Absen berhasil dikirim";
      document.getElementById("status").className = "white";
      document.getElementById("btnHadir").disabled = true;
    }
  })
  .catch(() => {
    document.getElementById("status").innerText = "Gagal mengirim absen";
    document.getElementById("status").className = "red";
  });
}
</script>
