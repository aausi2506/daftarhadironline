<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absen Online Kelas 8D</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .container { max-width: 400px; margin: auto; }
    input, button { width: 100%; padding: 10px; margin: 10px 0; }
    button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Absen Online Siswa Kelas 8D</h2>
    <p>Silakan masukkan nama Anda lalu klik "Hadir".</p>
    <input type="text" id="nama" placeholder="Nama lengkap">
    <button id="btnHadir" onclick="absen()" disabled>Hadir</button>
    <p id="status"></p>
  </div>

  <script>
    // Koordinat sekolah
    const sekolahLat = -6.328985;
    const sekolahLng = 108.321355;
    const maxDistance = 0.1; // dalam km (100 meter)

    // Hitung jarak dengan rumus haversine
    function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
      const R = 6371; // radius bumi km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // Cek lokasi siswa
    navigator.geolocation.getCurrentPosition(function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const jarak = getDistanceFromLatLonInKm(lat, lng, sekolahLat, sekolahLng);
      if (jarak <= maxDistance) {
        document.getElementById("status").innerText = "Lokasi valid, Anda bisa absen.";
        document.getElementById("btnHadir").disabled = false;
      } else {
        document.getElementById("status").innerText = "Lokasi terlalu jauh dari sekolah. Tidak bisa absen.";
      }
    }, function(err) {
      document.getElementById("status").innerText = "Gagal mendapatkan lokasi: " + err.message;
    });

    // Kirim data ke Google Apps Script
    function absen() {
      const nama = document.getElementById("nama").value;
      if (!nama) {
        alert("Nama harus diisi!");
        return;
      }

      // Ganti URL di bawah dengan URL Web Apps Script Anda
      const scriptURL = "https://script.google.com/macros/s/AKfycbxYourScriptID/exec";

      fetch(scriptURL, {
        method: 'POST',
        body: new URLSearchParams({ "nama": nama, "status": "Hadir" })
      })
      .then(response => {
        document.getElementById("status").innerText = "Absen berhasil dikirim.";
      })
      .catch(error => {
        document.getElementById("status").innerText = "Terjadi kesalahan: " + error;
      });
    }
  </script>
</body>
</html>
