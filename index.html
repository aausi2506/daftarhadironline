<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absen Kehadiran SMP Negeri 3 Sindang</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1E90FF, #4682B4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .absen-box {
      background-color: #1E90FF;
      border: 4px solid white;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      width: 380px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      color: white;
    }
    .absen-box h2 {
      margin: 0;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .absen-box h3 {
      margin: 5px 0 20px 0;
      font-size: 18px;
      font-weight: normal;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 15px auto;
      border-radius: 50%;
      border: 3px solid white;
      object-fit: cover;
      display: block;
    }
    input {
      width: 90%;
      padding: 12px;
      margin: 15px 0;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      text-align: center;
    }
    button {
      width: 95%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button.enabled {
      background-color: white;
      color: #1E90FF;
      font-weight: bold;
    }
    button.enabled:hover {
      background-color: #f0f0f0;
    }
    button.disabled {
      background-color: #ccc;
      color: #666;
      cursor: not-allowed;
    }
    #status {
      margin-top: 15px;
      font-size: 14px;
      font-weight: bold;
    }
    #status.red {
      color: red;
    }
    #status.white {
      color: white;
    }
  </style>
</head>
<body>

  <div class="absen-box">
    <h2>ABSEN KEHADIRAN</h2>
    <h3>SMP Negeri 3 Sindang</h3>

    <!-- LOGO FIXED -->
    <img src="https://i.ibb.co/WNSc2wtP/LOGO-SMPN-3-SINDANG.png"
         alt="Logo SMP Negeri 3 Sindang"
         class="logo">

    <input type="text" id="nama" placeholder="Nama lengkap">
    <button id="btnHadir" class="disabled" onclick="absen()" disabled>Hadir</button>
    <p id="status" class="red">Anda berada diluar Jangkauan</p>
  </div>

  <script>
    const sekolahLat = -6.328985;
    const sekolahLng = 108.321355;
    const maxDistance = 0.1; // km (100 meter)

    function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    navigator.geolocation.getCurrentPosition(function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const jarak = getDistanceFromLatLonInKm(lat, lng, sekolahLat, sekolahLng);

      const status = document.getElementById("status");
      const btn = document.getElementById("btnHadir");

      if (jarak <= maxDistance) {
        status.innerText = "Absen Online";
        status.className = "white";
        btn.disabled = false;
        btn.className = "enabled";
      } else {
        status.innerText = "Anda berada diluar Jangkauan";
        status.className = "red";
        btn.disabled = true;
        btn.className = "disabled";
      }
    }, function(err) {
      document.getElementById("status").innerText =
        "Gagal mendapatkan lokasi: " + err.message;
      document.getElementById("status").className = "red";
    });

    function absen() {
      const nama = document.getElementById("nama").value;
      if (!nama) {
        alert("Nama harus diisi!");
        return;
      }

     const scriptURL = "https://script.google.com/macros/s/AKfycbzOhtk31OrXYL75oaAmssLDmPxgJUOrwSyRr6JMJnx72oQCvDQcSXkczWizpD07jEIS/exec";

      fetch(scriptURL, {
        method: 'POST',
        body: new URLSearchParams({ nama: nama, status: "Hadir" })
      })
      .then(() => {
        document.getElementById("status").innerText = "Absen berhasil dikirim.";
        document.getElementById("status").className = "white";
      })
      .catch(error => {
        document.getElementById("status").innerText = "Terjadi kesalahan: " + error;
        document.getElementById("status").className = "red";
      });
    }
  </script>

</body>
</html>
